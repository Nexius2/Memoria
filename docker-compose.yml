services:
  memoria:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memoria
    ports:
      - "8080:8080"
    environment:
      TZ: Europe/Paris
      SECRET_KEY: change-me-with-a-long-random-secret
      DATABASE_PATH: /data/memoria.db
      SCHEDULER_ENABLED: "1"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s