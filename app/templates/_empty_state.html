<div class="rounded-[24px] border border-emerald-400/10 bg-black/10 px-6 py-8 text-center">
  <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl border border-emerald-400/15 bg-emerald-500/10 text-2xl">
    {{ empty_state_icon or 'ℹ' }}
  </div>

  <h3 class="mt-4 text-lg font-semibold text-white">
    {{ empty_state_title }}
  </h3>

  {% if empty_state_message %}
    <p class="mx-auto mt-2 max-w-2xl text-sm leading-6 text-emerald-200/70">
      {{ empty_state_message }}
    </p>
  {% endif %}

  {% if empty_state_action_url and empty_state_action_label %}
    <div class="mt-5">
      <a href="{{ empty_state_action_url }}" class="btn-secondary">
        {{ empty_state_action_label }}
      </a>
    </div>
  {% endif %}
</div>
